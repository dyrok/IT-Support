<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>My Requests | FixMyPC</title>
  <meta name="description" content="View your support requests and track your live queue position.">

  <!-- Google Fonts: Inter -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- CSS Styles -->
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/layout.css">
  <link rel="stylesheet" href="css/components.css">
  <link rel="stylesheet" href="css/utilities.css">
</head>
<body>

  <!-- Sidebar Navigation -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"></rect><line x1="8" y1="21" x2="16" y2="21"></line><line x1="12" y1="17" x2="12" y2="21"></line><path d="M8 10l3 3 5-5"/></svg>
      </div>
      Fix<span>My</span>PC
    </div>

    <nav class="nav-menu">
      <a href="index.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
        Home
      </a>
      <a href="services.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
        Services
      </a>
      <a href="booking.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></svg>
        Book Session
      </a>
      <a href="queue.html" class="nav-item active">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></svg>
        My Requests
      </a>
      <a href="contact.html" class="nav-item">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
        Contact
      </a>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="main-content">

    <!-- Mobile Header -->
    <header class="page-header">
      <div class="header-title">
        <h1>My Requests</h1>
        <p>View your booked sessions and track your queue position.</p>
      </div>
      <div class="header-actions">
        <button class="mobile-nav-toggle" aria-label="Toggle Navigation">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="3" y1="12" x2="21" y2="12"></line><line x1="3" y1="6" x2="21" y2="6"></line><line x1="3" y1="18" x2="21" y2="18"></line></svg>
        </button>
      </div>
    </header>

    <!-- Ticket List (full width) -->
    <div class="mb-48" id="ticketListCard">
      <div class="ticket-list-header mb-24">
        <h3 class="mb-0">Your Booked Sessions</h3>
        <a href="booking.html" class="btn btn-sm btn-primary">+ New Session</a>
      </div>
      <div id="ticketListContainer">
        <!-- JS will populate this -->
      </div>
    </div>

    <!-- Active Queue Display (Hidden by default, centered) -->
    <div class="queue-container mb-48">
      <div class="queue-display" id="queueDisplay">
        <button class="back-link" id="backToListBtn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"></line><polyline points="12 19 5 12 12 5"></polyline></svg>
          Back to requests
        </button>

        <div class="text-center">
          <div class="status-ring" id="statusRing">
            <span>Position</span>
            <div class="position-number" id="queuePosition">--</div>
          </div>

          <div class="wait-metrics">
            <div class="metric-box">
              <div class="metric-label">Estimated Wait</div>
              <div class="metric-val" id="waitTime">-- mins</div>
            </div>

            <div class="metric-box">
              <div class="metric-label">Status</div>
              <div class="metric-val queue-status-text" id="queueStatusText">Connecting to queue...</div>
            </div>
          </div>

          <button id="connectBtn" class="btn btn-outline w-full p-16" disabled>
            Waiting for Technician...
          </button>
        </div>
      </div>
    </div>

    <!-- Footer -->
    <footer class="main-footer">
      <div>&copy; 2026 FixMyPC. All rights reserved.</div>
      <div class="footer-links">
        <a href="#">Privacy Policy</a>
        <a href="#">Terms of Service</a>
      </div>
    </footer>

  </main>

  <script src="js/main.js"></script>
  <script src="js/queue.js"></script>
</body>
</html>
